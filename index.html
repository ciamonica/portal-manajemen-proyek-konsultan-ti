<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal Manajemen Proyek Konsultan TI</title>
    <style>
        :root {
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            color: #172033;
            background: #f5f8fb;
        }

        * {
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            margin: 0;
            display: grid;
            place-items: center;
            padding: 24px;
            background: linear-gradient(180deg, #f8fafc 0%, #edf3f6 100%);
        }

        main {
            width: min(720px, 100%);
            padding: 32px;
            border: 1px solid #d7e0ea;
            border-top: 5px solid #276f66;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 18px 38px rgba(15, 23, 42, 0.08);
        }

        h1 {
            margin: 0 0 10px;
            font-size: clamp(1.8rem, 4vw, 2.6rem);
            line-height: 1.1;
        }

        p {
            margin: 0;
            color: #5f6f84;
            line-height: 1.7;
        }

        .actions {
            display: flex;
            margin-top: 24px;
        }

        a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
            padding: 10px 16px;
            border-radius: 8px;
            background: #2f6f9f;
            color: #ffffff;
            font-weight: 800;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <h1>Portal Manajemen Proyek Konsultan TI</h1>
        <p>
            Versi utama website ada pada aplikasi React + Express di folder frontend dan backend.
            Jalankan backend di port 4000 dan frontend di port 5173, lalu buka portal modernnya.
        </p>
        <div class="actions">
            <a href="http://localhost:5173">Buka Portal React</a>
        </div>
    </main>
</body>
</html>
