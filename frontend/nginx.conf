# ========================================================
# KATEGORI      : Nginx Configuration (Frontend)
# DESKRIPSI     : Konfigurasi server HTTP Nginx di dalam Docker.
# FUNGSI UTAMA  : Menyajikan file statis React dan mem-proxy request API ke backend.
# ========================================================

server {
  # Mendengarkan request HTTP pada port 80
  listen 80;
  # Menerima request dari semua hostname (wildcard)
  server_name _;

  # Direktori root tempat file statis React berada (hasil build Vite)
  root /usr/share/nginx/html;
  # File default yang disajikan saat mengakses direktori
  index index.html;

  # --------------------------------------------------------
  # LOKASI: / (Semua request frontend)
  # Menggunakan try_files untuk mendukung client-side routing (SPA).
  # Jika file tidak ditemukan, kembalikan index.html agar React Router menangani navigasi.
  # --------------------------------------------------------
  location / {
    try_files $uri $uri/ /index.html;
  }

  # --------------------------------------------------------
  # LOKASI: /api/ (Proxy ke Backend)
  # Meneruskan semua request yang dimulai dengan /api/ ke layanan backend.
  # Ini memungkinkan frontend dan backend berjalan di domain yang sama (menghindari CORS).
  # --------------------------------------------------------
  location /api/ {
    # Meneruskan request ke backend container pada port 4000
    proxy_pass http://backend:4000/api/;
    # Meneruskan header Host asli dari client
    proxy_set_header Host $host;
    # Meneruskan IP asli client
    proxy_set_header X-Real-IP $remote_addr;
    # Meneruskan chain IP (jika ada load balancer di depan)
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    # Meneruskan protokol asli (http/https)
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}
