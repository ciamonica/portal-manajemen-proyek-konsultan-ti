services:
  mysql:
    image: mysql:8.4
    container_name: portal-management-mysql
    environment:
      MYSQL_DATABASE: project_portal
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database.sql:/docker-entrypoint-initdb.d/01-database.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: portal-management-backend
    environment:
      NODE_ENV: production
      PORT: 4000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_NAME: project_portal
      DB_USER: root
      DB_PASSWORD: rootpassword
      JWT_SECRET: change_this_to_a_long_random_secret
      JWT_EXPIRES_IN: 2h
      CORS_ORIGIN: http://localhost:8080
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "4000:4000"

  frontend:
    build:
      context: ./frontend
    container_name: portal-management-frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  mysql-data:
